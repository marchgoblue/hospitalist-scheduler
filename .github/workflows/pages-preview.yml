name: Publish GitHub Pages previews

on:
  push:
    branches:
      - main
      - "codex/**"
      - "codex-*"
      - "preview/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.ref_name != 'gh-pages'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare preview path
        id: vars
        shell: bash
        run: |
          safe_branch="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr -cd 'a-z0-9._-')"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "publish_path=." >> "$GITHUB_OUTPUT"
            echo "preview_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_OUTPUT"
          else
            echo "publish_path=previews/${safe_branch}" >> "$GITHUB_OUTPUT"
            echo "preview_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/previews/${safe_branch}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site files
        shell: bash
        run: |
          rm -rf site-build
          mkdir -p site-build
          cp index.html site-build/index.html
          rm -rf main-build
          mkdir -p main-build
          git fetch origin main:refs/remotes/origin/main
          git show origin/main:index.html > main-build/index.html || cp index.html main-build/index.html

      - name: Check out Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages-branch
        continue-on-error: true

      - name: Create Pages branch if needed
        shell: bash
        run: |
          if [ ! -d pages-branch/.git ]; then
            rm -rf pages-branch
            mkdir pages-branch
            cd pages-branch
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

      - name: Publish files
        shell: bash
        run: |
          cd pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_path="${{ steps.vars.outputs.publish_path }}"
          if [ "$publish_path" = "." ]; then
            find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "previews" -exec rm -rf {} +
            cp -R ../site-build/. .
          else
            if [ ! -f index.html ]; then
              cp ../main-build/index.html index.html
            fi
            mkdir -p "$publish_path"
            rm -rf "$publish_path"/*
            cp -R ../site-build/. "$publish_path"/
          fi

          : > .nojekyll

          if [ "$publish_path" != "." ]; then
            cat > previews/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Hospitalist Scheduler Previews</title>
            </head>
            <body style="font-family: Arial, sans-serif; margin: 40px;">
              <h1>Hospitalist Scheduler Previews</h1>
              <p>Open the branch-specific preview folder from the workflow summary.</p>
            </body>
          </html>
          EOF
          fi

          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Publish ${GITHUB_REF_NAME} preview"
            git push origin gh-pages
          fi

      - name: Show preview URL
        run: echo "Preview URL: ${{ steps.vars.outputs.preview_url }}"
